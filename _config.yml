title: Standard Sats
description: Lightning-native synthetic assets
baseurl: ""
url: "https://standardsats.github.io"
lang: en-US

logo: /assets/img/logo.webp
apkpic: /assets/img/apk_pic.png
show_downloads: false
github_username: standardsats

# project / resource links (used in footer + landing)
chat: https://t.me/StandardSatsCommunity
eclair: https://github.com/ACINQ/eclair
plugin: https://github.com/standardsats/plugin-fiat-channels
wallet: https://github.com/standardsats/wallet
wallet_eur_release: https://github.com/standardsats/valet/releases/tag/4.4.1
rfc: https://github.com/standardsats/fiat-channels-rfc
telegram: https://t.me/StandardSatsCommunity

# social (footer)
social:
  - { name: "Telegram",     url: "https://t.me/StandardSatsCommunity" }
  - { name: "X (Twitter)",  url: "https://x.com/standard_sats" }
  - { name: "YouTube",      url: "https://www.youtube.com/@standardsats" }
  - { name: "GitHub",       url: "https://github.com/standardsats" }

# top navigation
nav:
  - { title: "Home", url: "/en/" }
  - { title: "HC/FC Stack Setup", url: "/hosted-channel-tutorial/" }
  - title: "Valet"
    children:
      - { title: "Features", url: "/valet-features/" }
      - { title: "Comprehensive User Guide", url: "/valet-tutorial/" }
  - { title: "Grant Request", url: "/grant/" }

show_excerpts: false

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - README.md

plugins:
  - jekyll-redirect-from
  - jekyll-seo-tag
